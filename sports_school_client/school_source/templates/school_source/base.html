<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Клиент спортивной школы{% endblock %}</title>
    <style>
        :root {
            --page: #eef1f5;
            --panel: #101828;
            --panel-soft: #1d2939;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --text: #111827;
            --muted: #667085;
            --line: #e4e7ec;
            --accent: #5b6ee1;
            --accent-2: #3847b5;
            --danger: #d92d20;
            --success: #039855;
            --shadow: 0 18px 45px rgba(16, 24, 40, 0.10);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(91, 110, 225, 0.17), transparent 34rem),
                linear-gradient(135deg, #f8fafc 0%, var(--page) 100%);
        }

        .shell {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            min-height: 100vh;
        }

        aside {
            position: sticky;
            top: 0;
            height: 100vh;
            padding: 24px 18px;
            color: #ffffff;
            background:
                linear-gradient(180deg, rgba(91, 110, 225, 0.22), transparent 36%),
                var(--panel);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 8px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.10);
            margin-bottom: 18px;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), #a9b4ff);
            color: #101828;
            font-weight: 900;
            letter-spacing: -0.04em;
            box-shadow: 0 12px 32px rgba(91, 110, 225, 0.30);
        }

        .brand-title {
            font-size: 16px;
            font-weight: 800;
            line-height: 1.1;
        }

        .brand-subtitle {
            color: #98a2b3;
            font-size: 12px;
            margin-top: 4px;
        }

        nav {
            display: grid;
            gap: 8px;
        }

        nav a {
            display: flex;
            align-items: center;
            min-height: 42px;
            padding: 10px 12px;
            color: #d0d5dd;
            text-decoration: none;
            border-radius: 14px;
            border: 1px solid transparent;
            background: transparent;
            transition: 0.16s ease;
            font-weight: 650;
        }

        nav a:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.10);
            transform: translateX(2px);
        }

        .api-link {
            margin-top: 16px;
            color: #98a2b3;
            border-top: 1px solid rgba(255, 255, 255, 0.10);
            padding-top: 16px;
        }

        .workspace {
            min-width: 0;
            padding: 28px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
        }

        .source-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 13px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(228, 231, 236, 0.85);
            color: var(--muted);
            box-shadow: 0 10px 26px rgba(16, 24, 40, 0.06);
            font-size: 13px;
            font-weight: 700;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 0 5px rgba(91, 110, 225, 0.13);
        }

        main {
            max-width: 1320px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 20px;
            font-size: clamp(28px, 4vw, 42px);
            line-height: 1.05;
            letter-spacing: -0.04em;
        }

        h2 {
            margin: 0 0 16px;
            font-size: 18px;
            letter-spacing: -0.015em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 18px;
        }

        .card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(228, 231, 236, 0.92);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
        }

        .card h2 {
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line);
        }

        .stat-card {
            position: relative;
            overflow: hidden;
            min-height: 128px;
        }

        .stat-card::after {
            content: "";
            position: absolute;
            right: -34px;
            top: -34px;
            width: 96px;
            height: 96px;
            border-radius: 999px;
            background: rgba(91, 110, 225, 0.13);
        }

        .stat-label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stat {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -0.06em;
            margin-top: 16px;
        }

        .muted { color: var(--muted); }

        .layout {
            display: grid;
            grid-template-columns: minmax(300px, 410px) 1fr;
            gap: 18px;
            align-items: start;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--surface);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        th, td {
            border-bottom: 1px solid var(--line);
            padding: 13px 14px;
            text-align: left;
            vertical-align: top;
        }

        tr:last-child td { border-bottom: 0; }

        th {
            color: #475467;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #f9fafb;
        }

        tbody tr:hover td, tr:hover td { background: #f7f8ff; }

        .form-row { margin-bottom: 14px; }

        label {
            display: block;
            font-weight: 800;
            margin-bottom: 7px;
            font-size: 13px;
            color: #344054;
        }

        .form-control, .form-select {
            width: 100%;
            min-height: 42px;
            border: 1px solid #d0d5dd;
            border-radius: 14px;
            padding: 11px 12px;
            font: inherit;
            background: #ffffff;
            outline: none;
            transition: 0.15s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(91, 110, 225, 0.13);
        }

        textarea.form-control { min-height: 104px; resize: vertical; }
        .form-check-input { width: 20px; height: 20px; accent-color: var(--accent); }

        .helptext, .help-text { display: none; }

        .errorlist {
            color: var(--danger);
            margin: 7px 0 0;
            padding-left: 18px;
            font-size: 13px;
        }

        button, .button {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 44px;
            border: 0;
            border-radius: 14px;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #ffffff;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 14px 28px rgba(91, 110, 225, 0.22);
            transition: 0.16s ease;
        }

        button:hover, .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(91, 110, 225, 0.30);
        }

        .messages { margin-bottom: 18px; }

        .message {
            padding: 13px 15px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: #ffffff;
            margin-bottom: 8px;
            box-shadow: 0 10px 24px rgba(16, 24, 40, 0.06);
            font-weight: 700;
        }

        .message.success { color: var(--success); border-color: #abefc6; background: #ecfdf3; }
        .message.error { color: var(--danger); border-color: #fecdca; background: #fef3f2; }

        code {
            background: #eef0ff;
            color: #3847b5;
            padding: 3px 7px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #e8ebff;
            color: #3847b5;
            font-size: 12px;
            font-weight: 900;
        }

        .badge-muted { background: #f2f4f7; color: #667085; }

        @media (max-width: 980px) {
            .shell { grid-template-columns: 1fr; }
            aside {
                position: static;
                height: auto;
                padding: 18px;
            }
            nav { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
            .api-link { margin-top: 6px; padding-top: 8px; }
            .workspace { padding: 18px; }
            .layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="shell">
    <aside>
        <div class="brand">
            <div class="brand-mark">SS</div>
            <div>
                <div class="brand-title">School Source</div>
                <div class="brand-subtitle">второй клиент</div>
            </div>
        </div>
        <nav>
            <a href="{% url 'dashboard' %}">Панель</a>
            <a href="{% url 'schools_page' %}">Школы</a>
            <a href="{% url 'sections_page' %}">Секции</a>
            <a href="{% url 'students_page' %}">Ученики</a>
            <a href="{% url 'attendance_page' %}">Посещаемость</a>
            <a href="{% url 'fitness_tests_page' %}">Тесты</a>
            <a href="{% url 'permissions_page' %}">Разрешения</a>
            <a class="api-link" href="/api/status/">API status</a>
        </nav>
    </aside>

    <div class="workspace">
        <main>
            <div class="topbar">
                <div class="source-pill"><span class="dot"></span>Локальный источник данных</div>
            </div>
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message {{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</div>
</body>
</html>
